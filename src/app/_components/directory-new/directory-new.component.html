<form #directoryForm="ngForm">

  <div class="field grid mb-3">
    <label class="col-4 mb-0 md:col-6" for="name">Name: <span class="highlight ml-1">*</span></label>
    <div class="col-8 md:col-6">
      <input [(ngModel)]="model.name" class="w-full" id="name" maxlength="200" name="name" pInputText
             required/>
    </div>
  </div>

<!--  <div class="field grid mb-3">-->
<!--    <label class="col-4 mb-0 md:col-6" for="description">Description:</label>-->
<!--    <div class="col-8 md:col-6">-->
<!--      <textarea [(ngModel)]="model.description" class="w-full" id="description" maxlength="200" name="description" pTextarea></textarea>-->
<!--    </div>-->
<!--  </div>-->

</form>

<div class="flex justify-content-between mt-3">
  <p-button
    (onClick)="cancel()"
    label="Cancel"
    outlined
  />
  <p-button
    (onClick)="addDirectory()"
    [disabled]="!directoryForm.valid"
    [loading]="loading"
    icon="pi pi-plus"
    label="Add"
  />
</div>
